<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jason</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>

</head>
<body>

  <!-- Header -->
  <header>
    <div class="status-dot"></div>
    <span class="header-title">Jason</span>
    <span class="header-model">openrouter · gpt-oss-120b</span>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div id="empty-state">
      <p>Send a message to start</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" rows="1" placeholder="Ask anything..."></textarea>
      <button id="send-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for new line</p>
  </div>

  
</body>
</html>
