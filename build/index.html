<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jason</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="status-dot"></div>
    <span class="header-title">Jason</span>
    <span class="header-model">openrouter · gpt-oss-120b</span>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div id="empty-state">
      <p>Send a message to start</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" rows="1" placeholder="Ask anything..."></textarea>
      <button id="send-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </button>
    </div>
    <p class="input-hint">Enter to send · Shift+Enter for new line</p>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    let isLoading    = false;
    let msgId        = 0;

    // Auto-grow textarea as user types
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 128) + 'px';
    });

    // Send on Enter, new line on Shift+Enter
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);

    // Remove the "Send a message to start" placeholder
    function removeEmptyState() {
      const el = document.getElementById('empty-state');
      if (el) el.remove();
    }

    // Scroll to bottom of messages
    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Escape HTML so text doesn't break the page
    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    // Add the user's message bubble
    function addUserBubble(text) {
      removeEmptyState();
      const row = document.createElement('div');
      row.className = 'user-row';
      row.innerHTML = `<div class="user-bubble">${escHtml(text)}</div>`;
      messagesEl.appendChild(row);
      scrollBottom();
    }

    // Add the animated thinking dots while waiting
    function addThinking() {
      const row = document.createElement('div');
      row.id = 'thinking';
      row.innerHTML = `
        <div class="thinking-dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>`;
      messagesEl.appendChild(row);
      scrollBottom();
    }

    function removeThinking() {
      const el = document.getElementById('thinking');
      if (el) el.remove();
    }

    // Add the AI response bubble + optional reasoning toggle
    function addAssistantBubble(content, reasoning) {
      const id = ++msgId;
      const hasReasoning = reasoning && reasoning.trim().length > 0;

      const row = document.createElement('div');
      row.className = 'assistant-row';

      row.innerHTML = `
        <div class="assistant-bubble">${escHtml(content)}</div>
        ${hasReasoning ? `
          <button class="reasoning-btn" onclick="toggleReasoning(${id})">
            💡 <span id="toggle-label-${id}">show reasoning</span>
          </button>
          <div class="reasoning-box" id="reasoning-${id}">${escHtml(reasoning)}</div>
        ` : ''}
      `;

      messagesEl.appendChild(row);
      scrollBottom();
    }

    // Add a red error bubble if the request fails
    function addErrorBubble(msg) {
      const div = document.createElement('div');
      div.innerHTML = `<div class="error-bubble">${escHtml(msg)}</div>`;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    // Show/hide the reasoning box
    function toggleReasoning(id) {
      const box   = document.getElementById(`reasoning-${id}`);
      const label = document.getElementById(`toggle-label-${id}`);
      const isOpen = box.classList.contains('open');
      box.classList.toggle('open');
      label.textContent = isOpen ? 'show reasoning' : 'hide reasoning';
      scrollBottom();
    }

    // Main send function
    async function send() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      addUserBubble(text);
      addThinking();

      try {
        const res = await fetch('http://localhost:8000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        removeThinking();
        addAssistantBubble(data.response || 'No response.', data.reasoning || '');

      } catch (err) {
        removeThinking();
        addErrorBubble('Error: ' + err.message);
      }

      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>

</body>
</html>
